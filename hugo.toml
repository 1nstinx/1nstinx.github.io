baseURL = 'https://1nstinx.github.io/'
languageCode = 'en-us'
title = "1nstinx's Blog!"
theme = "PaperMod"
publishDir = "docs"

[params]
    defaultTheme = "auto" # automatically switches between dark/light mode
    showShareButtons = true
    showCodeCopyButtons = true

# Disables SRI fingerprinting to prevent browsers from blocking stylesheets on GitHub Pages
[params.assets]
    disableFingerprinting = true

[outputs]
    home = ["HTML", "RSS", "JSON"]